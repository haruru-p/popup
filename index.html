 <title>Redirecting...</title>
</head>
<body>
 <h3>Redirecting...</h3>
 <script>
  window.open('window/index.html', 'popupWindowOpen', 'width: 800, height: 600, noopener, noreferrer')

  window.close()
 </script>

</html>
